# =============================================================================
# Ride-Hailing Mobility Pipeline — Docker Compose
# =============================================================================
# Phase 2 (current): Kafka cluster (3 brokers, KRaft) + Schema Registry + UI
# Phase 3 will add:  spark-master, spark-worker-1, spark-worker-2
# Phase 5 will add:  postgres (TimescaleDB)
# Phase 6 will add:  grafana
#
# Bring up:        docker compose up -d
# Tear down:       docker compose down
# Wipe data:       docker compose down -v
# Watch logs:      docker compose logs -f kafka-1
# =============================================================================

name: ride-hailing

services:

  # ---------------------------------------------------------------------------
  # Kafka brokers (KRaft mode — no Zookeeper)
  # All three are combined broker+controller nodes for simplicity in dev.
  # Three nodes give us a quorum of 2, so we can tolerate one broker dying.
  # ---------------------------------------------------------------------------

  kafka-1:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-1
    hostname: kafka-1
    restart: unless-stopped
    ports:
      - "9092:9092"   # external listener (for host-side clients)
    environment:
      # --- KRaft identity ---
      CLUSTER_ID: 'eWOMyUriTkKbGu_88D520w'
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093'

      # --- Listeners ---
      # INTERNAL  : in-Docker clients (Spark, kafka-ui, schema-registry)
      # EXTERNAL  : host-side clients (replay_producer running on host, debug)
      # CONTROLLER: KRaft consensus traffic (broker-to-broker only)
      KAFKA_LISTENERS: 'INTERNAL://0.0.0.0:19092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka-1:19092,EXTERNAL://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'

      # --- Replication & durability (3-broker dev cluster) ---
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2

      # --- Topic auto-create OFF ---
      # All topics are created explicitly by scripts/create_topics.py with the
      # right partitions, retention, and key. Letting Kafka auto-create them
      # would silently use defaults that break our partitioning strategy.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'

      # --- Group rebalance tuning (faster startup in dev) ---
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      # --- JVM heap (1G is plenty for replay workloads) ---
      KAFKA_HEAP_OPTS: '-Xms512M -Xmx1G'
    volumes:
      - kafka-1-data:/var/lib/kafka/data
    networks:
      - ride-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  kafka-2:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-2
    hostname: kafka-2
    restart: unless-stopped
    ports:
      - "9093:9092"
    environment:
      CLUSTER_ID: 'eWOMyUriTkKbGu_88D520w'
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093'
      KAFKA_LISTENERS: 'INTERNAL://0.0.0.0:19092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka-2:19092,EXTERNAL://localhost:9093'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_HEAP_OPTS: '-Xms512M -Xmx1G'
    volumes:
      - kafka-2-data:/var/lib/kafka/data
    networks:
      - ride-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  kafka-3:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-3
    hostname: kafka-3
    restart: unless-stopped
    ports:
      - "9094:9092"
    environment:
      CLUSTER_ID: 'eWOMyUriTkKbGu_88D520w'
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093'
      KAFKA_LISTENERS: 'INTERNAL://0.0.0.0:19092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka-3:19092,EXTERNAL://localhost:9094'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_HEAP_OPTS: '-Xms512M -Xmx1G'
    volumes:
      - kafka-3-data:/var/lib/kafka/data
    networks:
      - ride-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Schema Registry — keeps a versioned record of message schemas.
  # We're using JSON (not Avro) for ride-events, but Schema Registry is
  # included now so Phase 3 Spark jobs can register schemas and so we have
  # the option to migrate to Avro later without re-architecting.
  # ---------------------------------------------------------------------------

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: schema-registry
    hostname: schema-registry
    restart: unless-stopped
    ports:
      - "8081:8081"
    depends_on:
      kafka-1: { condition: service_healthy }
      kafka-2: { condition: service_healthy }
      kafka-3: { condition: service_healthy }
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: 'http://0.0.0.0:8081'
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'PLAINTEXT://kafka-1:19092,PLAINTEXT://kafka-2:19092,PLAINTEXT://kafka-3:19092'
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 3
    networks:
      - ride-net

  # ---------------------------------------------------------------------------
  # Kafka UI — browser dashboard for inspecting topics, messages, consumer
  # groups, and broker health. Available at http://localhost:8080.
  # ---------------------------------------------------------------------------

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    hostname: kafka-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      kafka-1: { condition: service_healthy }
      schema-registry: { condition: service_started }
    environment:
      KAFKA_CLUSTERS_0_NAME: ride-hailing-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: 'kafka-1:19092,kafka-2:19092,kafka-3:19092'
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: 'http://schema-registry:8081'
      DYNAMIC_CONFIG_ENABLED: 'true'
    networks:
      - ride-net
  
  spark-master:
    image: apache/spark:3.5.1-scala2.12-java17-python3-ubuntu
    container_name: spark-master
    hostname: spark-master
    restart: unless-stopped
    ports:
      - "7077:7077"
      - "4040:4040"
      - "8082:8080"
    environment:
      SPARK_NO_DAEMONIZE: 'true'
      KAFKA_BROKERS: 'kafka-1:19092,kafka-2:19092,kafka-3:19092'
      CHECKPOINT_DIR: '/checkpoints'
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
      --host spark-master --port 7077 --webui-port 8080
    volumes:
      - ./spark:/app/spark:ro
      - ./scripts:/app/scripts:ro
      - spark-checkpoints:/checkpoints
      - spark-ivy:/home/spark/.ivy2
      - spark-ivy:/home/spark/.ivy2
      - spark-ivy:/home/spark/.ivy2
      - spark-ivy:/home/spark/.ivy2
    networks:
      - ride-net
    depends_on:
      kafka-1: { condition: service_healthy }
      kafka-2: { condition: service_healthy }
      kafka-3: { condition: service_healthy }

  spark-worker-1:
    image: apache/spark:3.5.1-scala2.12-java17-python3-ubuntu
    container_name: spark-worker-1
    hostname: spark-worker-1
    restart: unless-stopped
    environment:
      SPARK_NO_DAEMONIZE: 'true'
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
      --cores 2 --memory 1G --webui-port 8081
    volumes:
      - ./spark:/app/spark:ro
      - ./scripts:/app/scripts:ro
      - spark-checkpoints:/checkpoints
      - spark-ivy:/home/spark/.ivy2
      - spark-ivy:/home/spark/.ivy2
      - spark-ivy:/home/spark/.ivy2
    networks:
      - ride-net
    depends_on:
      spark-master: { condition: service_started }

  spark-worker-2:
    image: apache/spark:3.5.1-scala2.12-java17-python3-ubuntu
    container_name: spark-worker-2
    hostname: spark-worker-2
    restart: unless-stopped
    environment:
      SPARK_NO_DAEMONIZE: 'true'
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
      --cores 2 --memory 1G --webui-port 8081
    volumes:
      - ./spark:/app/spark:ro
      - ./scripts:/app/scripts:ro
      - spark-checkpoints:/checkpoints
      - spark-ivy:/home/spark/.ivy2
      - spark-ivy:/home/spark/.ivy2
      - spark-ivy:/home/spark/.ivy2
    networks:
      - ride-net
    depends_on:
      spark-master: { condition: service_started }

# =============================================================================
# Networks & volumes
# =============================================================================

networks:
  ride-net:
    name: ride-net
    driver: bridge

volumes:
  kafka-1-data:
  kafka-2-data:
  kafka-3-data:
  spark-checkpoints:
  spark-ivy:
